name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 部署 Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一次部署，新推送取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # svelte-check 类型检查 + vite 生产构建（base=/feizhi-webhid/）
      - run: pnpm build

      # 首次运行自动启用 Pages（source = GitHub Actions）
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
